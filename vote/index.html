<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Merci pour votre vote — Turismo</title>
<link rel="icon" href="data:,">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#ffffff;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{min-height:100vh;display:flex;flex-direction:column;}

  .wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:56px 24px;}
  .card{width:100%;max-width:560px;text-align:center;animation:reveal .6s cubic-bezier(.16,1,.3,1) both;}

  .logo{display:block;width:132px;max-width:44%;height:auto;margin:0 auto 56px;}

  .check{width:72px;height:72px;margin:0 auto 32px;background:#0071e3;border-radius:72px;display:flex;align-items:center;justify-content:center;box-shadow:0 12px 32px rgba(0,113,227,.24);animation:pop .5s cubic-bezier(.34,1.56,.64,1) .15s both;}
  .check svg{width:32px;height:32px;display:block;}

  h1{margin:0 0 20px;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Helvetica,Arial,sans-serif;font-size:44px;line-height:48px;font-weight:700;letter-spacing:-1.4px;color:#1d1d1f;}
  .lead{margin:0 auto 14px;max-width:440px;font-size:20px;line-height:29px;color:#1d1d1f;font-weight:500;letter-spacing:-0.2px;}
  .lead .ville{color:#0071e3;font-weight:600;}
  .sub{margin:0 auto 40px;max-width:440px;font-size:16px;line-height:25px;color:#6e6e73;}

  .btn{display:inline-block;padding:14px 34px;background:#0071e3;color:#ffffff;font-size:16px;font-weight:600;letter-spacing:-0.1px;line-height:20px;text-decoration:none;border-radius:980px;transition:background-color .15s ease,transform .15s ease;}
  .btn:hover{background:#0077ed;}
  .btn:active{transform:scale(.98);}

  footer{padding:40px 24px 48px;text-align:center;border-top:1px solid #e2e2e4;margin:0 24px;}
  footer p{margin:0;font-size:13px;line-height:19px;color:#86868b;max-width:560px;margin-left:auto;margin-right:auto;}

  @keyframes reveal{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes pop{0%{opacity:0;transform:scale(.6);}60%{transform:scale(1.08);}100%{opacity:1;transform:scale(1);}}
  @media (prefers-reduced-motion:reduce){.card,.check{animation:none;}}

  @media (max-width:520px){
    h1{font-size:34px;line-height:38px;letter-spacing:-1px;}
    .lead{font-size:18px;line-height:26px;}
    .logo{margin-bottom:40px;}
    .check{width:64px;height:64px;margin-bottom:26px;}
    .check svg{width:28px;height:28px;}
  }
</style>
</head>
<body>

<div class="wrap">
  <main class="card">
    <img class="logo" src="https://www.image2url.com/r2/default/images/1781196186902-e3d0b078-78c8-48ef-a206-45ad6e9b845f.png" alt="Turismo">

    <div class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="4,12.5 10,18.5 20,7"></polyline>
      </svg>
    </div>

    <h1>Merci pour votre vote.</h1>
    <p class="lead">Votre voix pour <span class="ville" id="ville-nom">votre ville</span> a bien été enregistrée.</p>
    <p class="sub">Nous vous tiendrons informés dès que la ville du prochain événement actionnaires sera confirmée.</p>

    <a class="btn" href="https://drive-turismo.com">Retourner sur drive-turismo.com</a>
  </main>
</div>

<footer>
  <p>Angel Fievez &amp; l'équipe Turismo<br>Bertrange, Luxembourg</p>
</footer>

<script>
  (function(){
    var villes = {
      paris:      'Paris',
      bruxelles:  'Bruxelles',
      geneve:     'Genève',
      luxembourg: 'Luxembourg'
    };
    var params = new URLSearchParams(window.location.search);
    var raw = (params.get('ville') || '').toLowerCase().trim();
    var nom = villes[raw];
    var el = document.getElementById('ville-nom');
    if (nom) {
      el.textContent = nom;
      document.title = 'Merci pour votre vote pour ' + nom + ' — Turismo';
    } else {
      // Fallback élégant : masque la ligne si aucune ville reconnue
      var lead = el.closest('.lead');
      if (lead) lead.style.display = 'none';
    }
  })();
</script>

</body>
</html>
